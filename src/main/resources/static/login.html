<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EventHub – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #1A56DB;
      --primary-dark: #1648C0;
      --bg: #F4F6F9;
      --card: #FFFFFF;
      --text: #111827;
      --muted: #6B7280;
      --border: #E5E7EB;
      --input-bg: #F9FAFB;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #d1ddf7 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.45;
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--card);
      border-radius: 20px;
      box-shadow: 0 4px 32px rgba(26,86,219,0.08), 0 1px 4px rgba(0,0,0,0.06);
      padding: 44px 40px 36px;
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.5s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .brand-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1A56DB 0%, #3B82F6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(26,86,219,0.3);
    }

    .brand-icon svg { width: 32px; height: 32px; fill: white; }

    .brand-name { font-size: 22px; font-weight: 700; color: var(--text); }
    .brand-sub  { font-size: 13.5px; color: var(--muted); margin-top: -6px; }
    .form-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 20px; }

    .field { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
    }

    .input-wrap { position: relative; }

    input[type="email"], input[type="password"], input[type="text"] {
      width: 100%;
      padding: 11px 14px;
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input::placeholder { color: #9CA3AF; }
    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(26,86,219,0.1);
      background: #fff;
    }

    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
    }

    .forgot {
      display: block;
      text-align: right;
      font-size: 13px;
      color: var(--primary);
      text-decoration: none;
      margin-top: 6px;
      font-weight: 500;
    }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
      box-shadow: 0 2px 8px rgba(26,86,219,0.25);
    }
    .btn-primary:hover { background: var(--primary-dark); }

    .footer-text {
      text-align: center;
      margin-top: 22px;
      font-size: 13.5px;
      color: var(--muted);
    }
    .footer-text a { color: var(--primary); font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5C3.9 3 3 3.9 3 5v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 18H5V9h14v12zm0-14H5V5h14v2zM7 11h5v5H7z"/></svg>
      </div>
      <div class="brand-name">EventHub</div>
      <div class="brand-sub">Sistem Manajemen Event &amp; Peserta</div>
    </div>

    <div class="form-title">Masuk ke akun Anda</div>

    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="nama@email.com"/>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="••••••••••"/>
        <button class="toggle-pw" onclick="togglePassword()" type="button">
          <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <a href="#" class="forgot">Lupa password?</a>
    </div>

    <button class="btn-primary" onclick="handleLogin()">Masuk</button>

    <p class="footer-text">
      Belum punya akun? <a href="register.html">Daftar sekarang</a>
    </p>
  </div>

  <script>
    function togglePassword() {
      const pw = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;
      } else {
        pw.type = 'password';
        icon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
      }
    }

    if (localStorage.getItem('token')) { window.location.href = 'dashboard.html'; }

    function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { showErr('Email dan password wajib diisi!'); return; }
      const btn = document.querySelector('.btn-primary');
      btn.textContent = 'Memproses...'; btn.disabled = true;
      fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('namaUser', data.nama);
          localStorage.setItem('emailUser', data.email);
          localStorage.setItem('roleUser', data.role);
          localStorage.setItem('idUser', data.id);
          localStorage.setItem('telpUser',     data.telp      || '');
          localStorage.setItem('kotaUser',     data.kota      || '');
          localStorage.setItem('institusiUser', data.institusi || '');
          window.location.href = 'dashboard.html';
        } else {
          showErr(data.message || 'Email atau password salah!');
          btn.textContent = 'Masuk'; btn.disabled = false;
        }
      })
      .catch(() => { showErr('Gagal konek ke server!'); btn.textContent = 'Masuk'; btn.disabled = false; });
    }

    function showErr(msg) {
      let el = document.getElementById('err');
      if (!el) { el = document.createElement('div'); el.id = 'err';
        el.style.cssText = 'background:#fee2e2;color:#b91c1c;padding:10px 14px;border-radius:8px;font-size:13.5px;margin-bottom:12px;';
        document.querySelector('.form-title').after(el); }
      el.textContent = msg;
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  </script>
</body>
</html>
