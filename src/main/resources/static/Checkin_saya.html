<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check-In Saya — EventHub</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#1a56db;--primary-dark:#1341b3;--primary-light:#ebf1fd;--sidebar-bg:#0f2044;--sidebar-hover:rgba(255,255,255,0.07);--sidebar-active:rgba(255,255,255,0.14);--white:#ffffff;--gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;--gray-300:#cbd5e1;--gray-400:#94a3b8;--gray-500:#64748b;--gray-600:#475569;--gray-700:#334155;--gray-800:#1e293b;--success:#10b981;--success-light:#d1fae5;--warning:#f59e0b;--danger:#ef4444;--danger-light:#fee2e2;--font:'Plus Jakarta Sans',sans-serif;--shadow-sm:0 1px 3px rgba(0,0,0,0.07);--shadow-md:0 4px 16px rgba(0,0,0,0.1);--radius-sm:6px;--radius:10px;--radius-lg:14px;--sidebar-w:220px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--gray-50);color:var(--gray-800);display:flex;min-height:100vh;font-size:14px;}
button{cursor:pointer;font-family:var(--font);border:none;outline:none;}
.sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--sidebar-bg);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;}
.sidebar-brand{display:flex;align-items:center;gap:10px;padding:22px 18px 18px;border-bottom:1px solid rgba(255,255,255,0.07);}
.brand-icon{width:36px;height:36px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.brand-icon svg{width:20px;height:20px;fill:white;}
.brand-name{font-size:17px;font-weight:700;color:white;}
.sidebar-nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:2px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);color:rgba(255,255,255,0.6);font-size:13.5px;font-weight:500;cursor:pointer;transition:all 0.18s;text-decoration:none;}
.nav-item:hover{background:var(--sidebar-hover);color:rgba(255,255,255,0.9);}
.nav-item.active{background:var(--sidebar-active);color:white;font-weight:600;}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:0.8;}
.nav-item.active svg{opacity:1;}
.sidebar-footer{padding:14px 10px;border-top:1px solid rgba(255,255,255,0.07);}
.user-info{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;}
.user-info:hover{background:var(--sidebar-hover);border-radius:var(--radius-sm);}
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;flex-shrink:0;}
.user-name{font-size:13px;font-weight:600;color:white;}
.user-role{font-size:11px;color:rgba(255,255,255,0.4);}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;background:var(--white);border-bottom:1px solid var(--gray-200);position:sticky;top:0;z-index:50;}
.topbar h1{font-size:18px;font-weight:700;}
.topbar p{font-size:13px;color:var(--gray-500);margin-top:1px;}
.content{padding:24px 28px;}
.checkin-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;}
@media(max-width:700px){.checkin-grid{grid-template-columns:1fr;}}
.checkin-card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--gray-200);box-shadow:var(--shadow-sm);overflow:hidden;transition:box-shadow 0.2s;}
.checkin-card:hover{box-shadow:var(--shadow-md);}
.checkin-card-header{padding:16px 18px;border-bottom:1px solid var(--gray-100);display:flex;gap:12px;align-items:flex-start;}
.checkin-color{width:4px;border-radius:2px;align-self:stretch;flex-shrink:0;}
.checkin-info{flex:1;}
.checkin-event-name{font-size:15px;font-weight:700;color:var(--gray-800);margin-bottom:4px;}
.checkin-meta{font-size:12px;color:var(--gray-500);display:flex;flex-direction:column;gap:3px;}
.checkin-status{flex-shrink:0;}
.status-badge{font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;}
.status-hadir{background:var(--success-light);color:#065f46;}
.status-belum{background:var(--danger-light);color:#991b1b;}
.status-aktif{background:var(--primary-light);color:var(--primary-dark);}
.status-belum-waktu{background:#fef3c7;color:#92400e;}
.checkin-footer{padding:14px 18px;background:var(--gray-50);display:flex;align-items:center;justify-content:space-between;}
.kode-wrap{display:flex;flex-direction:column;gap:2px;}
.kode-label{font-size:10px;color:var(--gray-400);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;}
.kode-val{font-family:monospace;font-size:13px;font-weight:700;color:var(--gray-700);}
.btn-checkin{padding:8px 18px;background:var(--primary);color:white;border-radius:var(--radius-sm);font-size:12px;font-weight:600;transition:all 0.15s;}
.btn-checkin:hover{background:var(--primary-dark);}
.btn-checkin:disabled{background:var(--gray-300);cursor:not-allowed;}
.btn-sudah{padding:8px 18px;background:var(--success-light);color:#065f46;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:default;}
.btn-belum-waktu{padding:8px 18px;background:var(--gray-100);color:var(--gray-400);border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:not-allowed;border:1.5px solid var(--gray-200);}
.countdown-wrap{margin-top:6px;font-size:11px;color:var(--gray-400);display:flex;align-items:center;gap:4px;}
.countdown-wrap strong{color:var(--warning);font-weight:700;}
.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--gray-400);}
.empty-state svg{width:48px;height:48px;margin-bottom:14px;opacity:0.3;}
.empty-state h3{font-size:16px;font-weight:600;color:var(--gray-600);margin-bottom:6px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:var(--radius-lg);width:100%;max-width:400px;box-shadow:0 20px 50px rgba(0,0,0,0.2);text-align:center;padding:32px 28px;}
.modal-icon{width:64px;height:64px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;}
.modal-icon.success{background:var(--success-light);}
.modal-icon.error{background:var(--danger-light);}
.modal-icon svg{width:32px;height:32px;}
.modal-title{font-size:18px;font-weight:700;margin-bottom:8px;}
.modal-msg{font-size:14px;color:var(--gray-500);margin-bottom:24px;}
.modal-btn{padding:11px 32px;background:var(--primary);color:white;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;}
.modal-btn:hover{background:var(--primary-dark);}
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast{padding:12px 18px;background:var(--gray-800);color:white;border-radius:var(--radius);font-size:13px;font-weight:500;box-shadow:var(--shadow-md);animation:slideIn 0.3s ease;}
.toast.success{background:#065f46;}
.toast.error{background:#991b1b;}
@keyframes slideIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:none;}}
.hidden{display:none!important;}
</style>
</head>

<script>
if (!localStorage.getItem('token')) { window.location.href = 'login.html'; }

var namaUser = localStorage.getItem('namaUser') || 'Pengguna';
var roleUser  = localStorage.getItem('roleUser') || 'peserta';
var idUser    = localStorage.getItem('idUser');

if (roleUser === 'penyelenggara') { window.location.href = 'laporan.html'; }

// ===== SIDEBAR ROLE =====
(function() {
  var el;
  el = document.getElementById('sidebarName');   if(el) el.textContent = namaUser;
  el = document.getElementById('sidebarRole');   if(el) el.textContent = roleUser.charAt(0).toUpperCase() + roleUser.slice(1);
  el = document.getElementById('sidebarAvatar'); if(el) el.textContent = namaUser.charAt(0).toUpperCase();
  var navLaporan    = document.getElementById('navLaporan');
  var navBroadcast  = document.getElementById('navBroadcast');
  if (roleUser === 'penyelenggara') {
    if(navLaporan)    navLaporan.classList.remove('hidden');
    if(navBroadcast)  navBroadcast.classList.remove('hidden');
  } else {
    if(navLaporan)    navLaporan.classList.add('hidden');
    if(navBroadcast)  navBroadcast.classList.add('hidden');
  }
})();
document.getElementById('sidebarName').textContent  = namaUser;
document.getElementById('sidebarAvatar').textContent = namaUser.charAt(0).toUpperCase();

function barColor(k) {
  return {seminar:'#3b82f6',workshop:'#10b981',konferensi:'#8b5cf6',webinar:'#f59e0b',bootcamp:'#ef4444'}[k] || '#94a3b8';
}

// ===== PARSE WAKTU MULAI EVENT =====
// Format tanggal: "18 Apr 2026" atau "2026-04-18"
// Format waktu:   "08.00-17.00 WIB" atau "08.07–09.00 WIB"
function parseEventStart(tanggal, waktu) {
  try {
    var tgl = (tanggal || '').trim();
    var dateObj;
    var bulanMap = {
      jan:0,feb:1,mar:2,apr:3,mei:4,jun:5,
      jul:6,agu:7,sep:8,okt:9,nov:10,des:11,
      may:4,aug:7,oct:9,dec:11
    };
    var m1 = tgl.match(/^(\d{1,2})\s+([a-zA-Z]+)\s+(\d{4})$/);
    if (m1) {
      var bln = bulanMap[m1[2].toLowerCase().slice(0,3)];
      dateObj = new Date(parseInt(m1[3]), bln !== undefined ? bln : 0, parseInt(m1[1]));
    } else {
      dateObj = new Date(tgl);
    }
    if (!dateObj || isNaN(dateObj.getTime())) return null;

    if (waktu) {
      // Hapus " WIB" dst, ambil bagian waktu mulai (sebelum strip/dash)
      var wStr = waktu.trim().replace(/\s*WIB.*/i, '');
      var jamMenitStr = wStr.split(/[-\u2013]/)[0].trim();
      var parts = jamMenitStr.split(/[.:]/);
      dateObj.setHours(parseInt(parts[0]) || 0, parseInt(parts[1]) || 0, 0, 0);
    }
    return dateObj;
  } catch(e) {
    return null;
  }
}

function formatCountdown(ms) {
  if (ms <= 0) return '';
  var totalSec = Math.floor(ms / 1000);
  var d = Math.floor(totalSec / 86400);
  var h = Math.floor((totalSec % 86400) / 3600);
  var m = Math.floor((totalSec % 3600) / 60);
  if (d > 0) return d + ' hari ' + h + ' jam lagi';
  if (h > 0) return h + ' jam ' + m + ' menit lagi';
  return m + ' menit lagi';
}

// ===== LOAD DATA =====
function loadCheckin() {
  fetch('/api/events/saya/' + idUser)
    .then(function(r) { return r.json(); })
    .then(function(pendaftaranList) {
      if (!pendaftaranList.length) {
        document.getElementById('checkinGrid').innerHTML =
          '<div class="empty-state">' +
          '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>' +
          '<h3>Belum ada event</h3><p>Daftar event terlebih dahulu</p></div>';
        return;
      }

      var promises = pendaftaranList.map(function(p) {
        return fetch('/api/tiket/pendaftaran/' + p.pendaftaranId)
          .then(function(r) { return r.json(); })
          .then(function(data) {
            return { pendaftaran: p, tikets: data.tiket || [] };
          })
          .catch(function() {
            return { pendaftaran: p, tikets: [] };
          });
      });

      Promise.all(promises).then(function(results) {
        renderCards(results);
      });
    })
    .catch(function() {
      document.getElementById('checkinGrid').innerHTML =
        '<div class="empty-state"><h3>Gagal memuat data</h3></div>';
    });
}

// ===== RENDER CARDS =====
function renderCards(results) {
  var grid = document.getElementById('checkinGrid');
  if (!results.length) {
    grid.innerHTML = '<div class="empty-state"><h3>Belum ada event terdaftar</h3></div>';
    return;
  }

  var now = new Date();

  grid.innerHTML = results.map(function(item) {
    var p      = item.pendaftaran;
    var tikets = item.tikets;
    var tiket  = tikets.length > 0 ? tikets[0] : null;
    var sudahHadir = tiket && tiket.statusTiket === 'digunakan';
    var color  = barColor(p.kategori);

    // --- Cek waktu ---
    var eventStart    = parseEventStart(p.tanggal, p.waktu);
    var sudahWaktunya = !eventStart || now >= eventStart;
    var selisihMs     = eventStart ? (eventStart - now) : 0;
    var countdown     = (!sudahWaktunya && selisihMs > 0) ? formatCountdown(selisihMs) : '';

    // --- Status badge ---
    var statusHtml;
    if (sudahHadir) {
      statusHtml = '<span class="status-badge status-hadir">&#x2705; Sudah Hadir</span>';
    } else if (!tiket) {
      statusHtml = '<span class="status-badge status-belum">Tiket tidak ada</span>';
    } else if (!sudahWaktunya) {
      statusHtml = '<span class="status-badge status-belum-waktu">&#x23F3; Belum Waktunya</span>';
    } else {
      statusHtml = '<span class="status-badge status-aktif">Belum Check-In</span>';
    }

    // --- Info countdown ---
    var countdownHtml = countdown
      ? '<div class="countdown-wrap">&#128336; Dibuka dalam <strong>' + countdown + '</strong></div>'
      : '';

    // --- Tombol aksi ---
    var btnHtml;
    if (sudahHadir) {
      btnHtml = '<button class="btn-sudah" disabled>&#x2705; Sudah Hadir</button>';
    } else if (!tiket) {
      btnHtml = '<button class="btn-checkin" disabled>Tidak ada tiket</button>';
    } else if (!sudahWaktunya) {
      btnHtml = '<button class="btn-belum-waktu" disabled title="Check-In akan dibuka saat event dimulai">&#128274; Belum Dibuka</button>';
    } else {
      btnHtml = '<button class="btn-checkin" onclick="doCheckin(\'' + tiket.kodeQr + '\')">Check-In Sekarang</button>';
    }

    var kodeQr = tiket ? tiket.kodeQr : p.kodeTiket;

    return '<div class="checkin-card">' +
      '<div class="checkin-card-header">' +
        '<div class="checkin-color" style="background:' + color + ';"></div>' +
        '<div class="checkin-info">' +
          '<div class="checkin-event-name">' + (p.nama || '-') + '</div>' +
          '<div class="checkin-meta">' +
            '<span>&#128197; ' + (p.tanggal || '-') + ' &middot; ' + (p.waktu || '') + '</span>' +
            '<span>&#128205; ' + (p.venue || '') + ', ' + (p.lokasi || '-') + '</span>' +
          '</div>' +
          countdownHtml +
        '</div>' +
        '<div class="checkin-status">' + statusHtml + '</div>' +
      '</div>' +
      '<div class="checkin-footer">' +
        '<div class="kode-wrap">' +
          '<div class="kode-label">Kode QR Tiket</div>' +
          '<div class="kode-val">' + kodeQr + '</div>' +
        '</div>' +
        btnHtml +
      '</div>' +
    '</div>';
  }).join('');

  // Auto-refresh tiap 30 detik agar countdown & status update otomatis
  if (window._checkinTimer) clearTimeout(window._checkinTimer);
  window._checkinTimer = setTimeout(function() { loadCheckin(); }, 30000);
}

// ===== CHECK-IN =====
function doCheckin(kodeQr) {
  fetch('/api/tiket/checkin', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ kodeQr: kodeQr, penyelenggaraId: 1 })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.success) {
      tampilModal(true, 'Check-In Berhasil!', 'Kehadiran kamu sudah tercatat. Selamat menikmati event!');
      loadCheckin();
    } else {
      tampilModal(false, 'Check-In Gagal', data.message || 'Terjadi kesalahan.');
    }
  })
  .catch(function() {
    tampilModal(false, 'Koneksi Gagal', 'Tidak bisa konek ke server. Coba lagi.');
  });
}

function tampilModal(sukses, judul, pesan) {
  document.getElementById('modalTitle').textContent = judul;
  document.getElementById('modalMsg').textContent   = pesan;
  var icon = document.getElementById('modalIcon');
  var svg  = document.getElementById('modalIconSvg');
  if (sukses) {
    icon.className = 'modal-icon success';
    svg.setAttribute('fill', '#10b981');
    svg.innerHTML = '<path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>';
  } else {
    icon.className = 'modal-icon error';
    svg.setAttribute('fill', '#ef4444');
    svg.innerHTML = '<path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>';
  }
  document.getElementById('modalOverlay').classList.add('open');
}

function tutupModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function logout() { localStorage.clear(); window.location.href = 'login.html'; }

function showToast(msg, type) {
  type = type || 'info';
  var wrap = document.getElementById('toast-wrap');
  var t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  wrap.appendChild(t);
  setTimeout(function() {
    t.style.opacity = '0'; t.style.transition = 'opacity 0.3s';
    setTimeout(function() { t.remove(); }, 300);
  }, 3000);
}

loadCheckin();
</script>
